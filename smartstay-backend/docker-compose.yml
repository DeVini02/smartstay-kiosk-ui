services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartstay
      POSTGRES_PASSWORD: smartstay
      POSTGRES_DB: smartstay
    ports:
      - "5432:5432"
    volumes:
      - smartstay_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartstay"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://smartstay:smartstay@db:5432/smartstay
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080,http://127.0.0.1:5173
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  smartstay_pg:
